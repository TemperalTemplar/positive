services:
  positive:
    build: .
    container_name: positive_engine
    ports:
      - "8178:8000"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    environment:
      - SECRET_KEY=change-this-secret-key-before-production
      - DEBUG=True
      - ALLOWED_HOSTS=192.168.177.127,positive.wrds361.com,localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=https://positive.wrds361.com
      - DISCORD_WEBHOOK=
      - ROCKETCHAT_WEBHOOK=
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_HOST_USER=
      - EMAIL_HOST_PASSWORD=
      - DEFAULT_FROM_EMAIL=positive@localhost
    restart: unless-stopped
