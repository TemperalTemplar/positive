<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ board_name }} | Positive Vision Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Courier New',monospace;min-height:100vh;padding:30px 20px}
h1{text-align:center;color:#00d4a0;font-size:28px;letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
.sub{text-align:center;color:#555;font-size:11px;letter-spacing:2px;margin-bottom:30px}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px}
.card{border:1px solid #222;border-radius:8px;overflow:hidden;max-width:320px;cursor:pointer;transition:transform 0.2s,border-color 0.2s}
.card:hover{transform:scale(1.03);border-color:#00d4a0}
.card img{max-width:320px;display:block;width:100%;object-fit:cover}
.caption{padding:8px 12px;font-size:11px;color:#777;text-align:center}
.footer{text-align:center;margin-top:40px;font-size:10px;color:#333;letter-spacing:2px}
</style>
</head>
<body>
<h1>{{ board_name }}</h1>
<div class="sub">SOVEREIGN VISION · {{ owner|upper }} · POSITIVE</div>
<div class="grid">
{% for image in images %}
<div class="card">
  <img src="{{ image.url }}" alt="Vision board element">
  {% if image.caption %}<div class="caption">{{ image.caption }}</div>{% endif %}
</div>
{% endfor %}
</div>
<div class="footer">GENERATED BY POSITIVE — SOVEREIGN INTENT ENGINE</div>
</body>
</html>
