{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% trans "Request Access" %} | POSITIVE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#161616;border:1px solid #252525;border-radius:10px;padding:40px;width:380px}
h1{color:#00d4a0;font-size:18px;letter-spacing:4px;text-align:center;margin-bottom:4px}
.sub{color:#444;font-size:9px;text-align:center;letter-spacing:2px;margin-bottom:24px}
.lbl{font-size:10px;color:#666;letter-spacing:1px;display:block;margin-bottom:4px;text-transform:uppercase}
input,textarea{background:#0a0a0a;color:#e0e0e0;border:1px solid #252525;padding:10px;border-radius:6px;font-family:inherit;font-size:13px;width:100%;margin-bottom:14px;display:block}
textarea{height:70px;resize:vertical}
input:focus,textarea:focus{outline:none;border-color:#00d4a0}
button{background:#00d4a0;color:#000;border:none;padding:11px;border-radius:6px;font-family:inherit;font-size:12px;letter-spacing:2px;width:100%;cursor:pointer;font-weight:bold;margin-top:4px}
button:hover{background:#00b88a}
.err{color:#e24b4a;font-size:11px;margin-bottom:14px;padding:8px;background:rgba(226,75,74,0.08);border-radius:6px;border:1px solid rgba(226,75,74,0.2)}
.back{text-align:center;margin-top:16px;font-size:11px;color:#555}
.back a{color:#00d4a0;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <h1>POSITIVE</h1>
  <div class="sub">{% trans "REQUEST ACCESS" %}</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label class="lbl">{% trans "Username" %}</label>
    <input type="text" name="username" required autocomplete="username">
    <label class="lbl">{% trans "Email (optional — for notifications)" %}</label>
    <input type="email" name="email" autocomplete="email">
    <label class="lbl">{% trans "Password" %}</label>
    <input type="password" name="password" required autocomplete="new-password">
    <label class="lbl">{% trans "Confirm Password" %}</label>
    <input type="password" name="password2" required autocomplete="new-password">
    <label class="lbl">{% trans "Note to admin (optional)" %}</label>
    <textarea name="note" placeholder="{% trans "Tell the admin why you'd like access…" %}"></textarea>
    <button type="submit">{% trans "SUBMIT REQUEST" %}</button>
  </form>
  <div class="back"><a href="/login/">{% trans "Back to login" %}</a></div>
</div>
</body>
</html>
