{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% trans "Email Sent" %} | POSITIVE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#161616;border:1px solid #252525;border-radius:10px;padding:40px;width:360px;text-align:center}
h1{color:#00d4a0;font-size:18px;letter-spacing:4px;margin-bottom:16px}
.icon{font-size:40px;margin-bottom:16px}
p{font-size:12px;color:#888;line-height:1.8;margin-bottom:20px}
a{color:#00d4a0;font-size:11px;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <div class="icon">&#128231;</div>
  <h1>{% trans "CHECK YOUR EMAIL" %}</h1>
  <p>{% trans "If an account exists with that email address, we have sent a password reset link. Check your inbox and follow the link." %}</p>
  <a href="/login/">{% trans "Back to login" %}</a>
</div>
</body>
</html>
